# ワークフローの名前
name: Wiki Access Booster

# ワークフローが実行されるタイミングを定義
on:
  schedule:
    # cron形式で5分ごとに実行するようスケジュール
    # 注意: GitHub Actionsのcronは最大15分程度遅延することがあります
    - cron: '*/5 * * * *'
  # 手動実行もできるようにする（「Actions」タブの「Run workflow」ボタン）
  workflow_dispatch:

# 実行されるジョブを定義
jobs:
  run-access-script:
    # 実行環境として最新のUbuntuを使用
    runs-on: ubuntu-latest
    
    # scrapingフォルダをワーキングディレクトリに指定
    defaults:
      run:
        working-directory: ./scraping

    # ジョブのステップ
    steps:
      # 1. リポジトリのコードをチェックアウトする
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python環境をセットアップする
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 使用するPythonのバージョン

      # 3. Chromeブラウザをセットアップする
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        
      # 4. Pythonの依存ライブラリをインストールする
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # 5. Pythonスクリプトを実行する
      - name: Run the script
        run: python main.py
