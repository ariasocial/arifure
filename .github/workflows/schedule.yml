name: Scheduled Scraper

on:
  schedule:
    # 5分ごと (*/5 * * * *) に設定
    - cron: '*/5 * * * *' 
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    
    steps:
      # 1. リポジトリのコードをチェックアウト (場所は変わらない)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python環境のセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' 

      # 3. 必要なライブラリのインストール
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./scraping  # 👈 修正点: scrapingフォルダ内で実行

      # 4. スクリプトの実行
      - name: Run scraper script
        run: python scraper.py
        working-directory: ./scraping  # 👈 修正点: scrapingフォルダ内で実行
