<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ正誤検索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css"> 
    <script src="directAccessRedirect.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen p-4 no-js-hidden">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">

        <input type="text" id="searchInput" placeholder="問題文を入力してください..." onkeyup="searchQuizzes()" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring focus:border-blue-300 mb-4">
        <div id="searchResults">
            </div>
    </div>

    <script src="script.js"></script>

</html>
