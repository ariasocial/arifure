<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ギルド情報ツール</title>
    <link rel="stylesheet" href="../root.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <h1 class="site-title">ギルド情報ツール</h1>
        <button class="menu-toggle" id="menu-toggle" aria-label="メニューを開く" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>
    <nav class="main-nav" id="main-nav">
        <ul>
            <li><a href="./index.html">ギルド情報ツール</a></li>
            <li><a href="../qualifiers/index.html">ギルド予選 対戦ツール</a></li>
        </ul>
    </nav>
    <!-- サブメニューを独立させる -->

    <div class="header-lines">
        <div class="line-thin"></div>
        <div class="line-thick"></div>
    </div>
    <div id="app" class="container"></div>

    <script src="../root.js"></script>
    <script>
        /**
         * JSONデータからギルド情報を抽出して表示します。
         */
        function extractGuildInfo() {
            const jsonInput = document.getElementById('jsonData').value;
            const resultDiv = document.getElementById('result');
            try {
                const data = JSON.parse(jsonInput);
                const guild = data.guild;

                if (!guild) {
                    throw new Error('ギルド情報が見つかりません。');
                }

                // ここにギルド情報を抽出・整形するロジックを記述します
                // 例：ギルド名とメンバー数を表示
                let output = `<h2>ギルド情報</h2>`;
                output += `<p>ギルド名: ${guild.name}</p>`;
                output += `<p>メンバー数: ${guild.members.length}人</p>`;
                
                resultDiv.innerHTML = output;

            } catch (e) {
                resultDiv.innerHTML = `<p style="color: red;">エラー: ${e.message}</p>`;
            }
        }

        /**
         * 入力と結果をクリアします。
         */
        function clearResult() {
            document.getElementById('jsonData').value = '';
            document.getElementById('result').innerHTML = '';
        }

        // ページの読み込みが完了したら共通UIを生成します。
        document.addEventListener('DOMContentLoaded', () => {
            const buttonConfigs = [
                { text: '実行', onClick: extractGuildInfo },
                { text: 'クリア', onClick: clearResult, className: 'button-secondary' }
            ];
            // JSONデータのタイトルを非表示にするオプションを追加
            createCommonUI('app', buttonConfigs, { showJsonTitle: false });
        });
    </script>
</body>
</html>
