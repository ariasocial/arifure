<!DOCTYPE html>

<head>

<body>

<header class="site-header">
    <h1 class="site-title">ギルド予選 対戦ツール</h1>
    <button class="menu-toggle" id="menu-toggle" aria-label="メニューを開く" aria-expanded="false">
        <span></span>
        <span></span>

    </button>
</header>
<nav class="main-nav" id="main-nav">
    <ul>
        <li><a href="../guild/index.html">ギルド情報ツール</a></li>
        <li><a href="./index.html">ギルド予選 対戦ツール</a></li>

<!-- サブメニューを独立させる -->

<div class="header-lines">
    <div class="line-thin"></div>
    <div class="line-thick"></div>
</div>

<div id="app" class="container"></div>

<script src="../root.js"></script>
<script src="script.js"></script>
<script>
    // ページの読み込みが完了したら共通UIを生成します。
    document.addEventListener('DOMContentLoaded', () => {
        // ボタンの設定
        const buttonConfigs = [
            { text: '実行', onClick: extractUsers },
            { text: 'クリア', onClick: clearInput, className: 'button-secondary' }
        ];

        // 共通UIをappコンテナに生成
        createCommonUI('app', buttonConfigs, { showJsonTitle: false });

        // このツール専用の結果表示エリアの構造を作成
        const resultDiv = document.getElementById('result');
        resultDiv.className = 'result-columns';
        resultDiv.innerHTML = `
            <div id="guild1-container" class="guild-container"></div>
            <div id="guild2-container" class="guild-container"></div>
        `;
    });
</script>
</body>
